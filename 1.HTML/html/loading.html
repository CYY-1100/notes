<!DOCTYPE html>
<html lang="en">

<head>
  <style>
    @keyframes myAnimationName {
      to {
        transform: rotate(360deg);
      }
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top-color: #333;
      border-radius: 50%;
      /* 动画名称 动画时长 速度曲线 循环次数 */
      animation: myAnimationName 1s linear infinite;
    }
  </style>
</head>

<body>
  <div class="loader"></div>

</body>

</html>
