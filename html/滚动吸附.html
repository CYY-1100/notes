<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    /* 重置默认样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 滚动容器：启用垂直滚动吸附 */
    .scroll-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory; /* 关键：启用垂直强制吸附。吸附方向和严格程度 */
      scrollbar-width: none; /* 隐藏 Firefox 滚动条 */
    }
    
    .scroll-container::-webkit-scrollbar {
      display: none; /* 隐藏 Webkit 滚动条 */
    }

    /* 每个页面区块 */
    .section {
      height: 100vh;
      scroll-snap-align: start; /* 关键：吸附到容器顶部 */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: white;
    }

    /* 背景色区分 */
    .section:nth-child(1) { background: #ff7e5f; }
    .section:nth-child(2) { background: #feb47b; }
    .section:nth-child(3) { background: #86a8e7; }
    .section:nth-child(4) { background: #91eae4; }
  </style>
</head>
<body>
  <div class="scroll-container">
    <div class="section">第 1 页</div>
    <div class="section">第 2 页</div>
    <div class="section">第 3 页</div>
    <div class="section">第 4 页</div>
  </div>
</body>
</html>
