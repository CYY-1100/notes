<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        .parent {
            /* 为子元素的绝对定位提供参考 */
            position: relative;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .child {
            position: absolute;
            top: 50%;
            left: 50%;
            /* 向左向上移动自身宽高的一半 */
            transform: translate(-50%, -50%);
            background-color: #FF9800;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="child">居中的内容</div>
    </div>
</body>

</html>
